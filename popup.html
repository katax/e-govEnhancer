<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>e-Gov法令検索</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <img src="icons/icon32.png" alt="" class="popup-logo">
      <h1 class="popup-title">法令検索Enhancer</h1>
    </div>

    <form id="searchForm" class="search-form">
      <div class="input-wrapper">
        <span class="search-icon">🔎</span>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="法令名を入力（例: 会社法、道路交通法）"
          autofocus
          autocomplete="off"
          lang="ja"
          inputmode="text"
        >
      </div>
      <button type="submit" class="search-btn">検索</button>
    </form>

    <div id="searchHint" class="search-hint">
      <div class="mode-slot mode-slot-left">
        <button id="mode0NavLeft" class="mode0-nav-btn" title="法令履歴へ">◀</button>
        <span id="modeLeftLabel" class="mode-label mode-label-target"></span>
      </div>
      <span id="modeCurrentLabel" class="search-hint-text mode-label mode-label-current"></span>
      <div class="mode-slot mode-slot-right">
        <span id="modeRightLabel" class="mode-label mode-label-target"></span>
        <button id="favFolderBtn" class="hist-nav-btn hist-folder-btn" title="フォルダを追加" style="display:none">📁+</button>
        <button id="mode0NavRight" class="mode0-nav-btn" title="お気に入りへ">▶</button>
      </div>
    </div>

    <div id="historyPanel" class="history-panel" style="display:none">
      <ul id="historyList" class="history-list"></ul>
    </div>

    <div id="searchResults" class="search-results"></div>

    <div class="quick-links">
      <a href="#" class="quick-link" data-url="https://laws.e-gov.go.jp/">
        e-Govトップページ
      </a>
    </div>

    <div class="popup-footer">
      <button id="openOptions" class="footer-btn">設定</button>
    </div>
  </div>
  <script src="shared/egov-shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
